<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MovixUniverse | Terminal V3.2</title>
    <style>
        :root {
            --hologram-blue: #00f3ff;
            --blood-red: #ff0000;
            --void: #020202;
            --glow-power: 15px;
            --blur-val: blur(0px);
        }

        body {
            margin: 0;
            background: var(--void);
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            overflow-x: hidden;
        }

        /* সেটিংস সাইডবার */
        #settingsMenu {
            position: fixed;
            top: 0;
            left: -280px;
            width: 260px;
            height: 100%;
            background: rgba(5, 5, 5, 0.98);
            border-right: 3px solid var(--hologram-blue);
            z-index: 9999;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1);
            padding: 20px;
            box-sizing: border-box;
        }

        #settingsMenu.active { left: 0; }

        .close-btn {
            text-align: right;
            font-size: 18px;
            color: var(--blood-red);
            cursor: pointer;
            text-shadow: 0 0 10px var(--blood-red);
            margin-bottom: 20px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        header {
            padding: 20px 10px;
            text-align: center;
            background: linear-gradient(to bottom, #000, transparent);
            border-bottom: 1px solid rgba(0, 243, 255, 0.3);
            position: sticky; top: 0; z-index: 1000;
        }

        .title-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            margin-bottom: 15px;
        }

        .settings-toggle {
            position: absolute;
            left: 10px;
            width: 30px;
            height: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            cursor: pointer;
        }

        .settings-toggle span {
            display: block;
            height: 3px;
            width: 100%;
            background: var(--hologram-blue);
            box-shadow: 0 0 8px var(--hologram-blue);
        }

        .brand {
            font-size: 22px;
            font-weight: 900;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: var(--hologram-blue);
            text-shadow: 0 0 15px var(--hologram-blue);
        }

        #searchInput {
            width: 85%;
            max-width: 450px;
            padding: 12px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(0, 243, 255, 0.5);
            color: #fff;
            text-align: center;
            border-radius: 20px;
            outline: none;
        }

        .db-counter {
            font-size: 10px;
            color: var(--hologram-blue);
            margin-top: 5px;
            letter-spacing: 2px;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 25px;
            padding: 25px 15px;
            max-width: 1000px;
            margin: auto;
        }

        .movie-card { text-decoration: none; backdrop-filter: var(--blur-val); padding: 5px; border-radius: 15px; transition: 0.3s; }

        .hologram-circle {
            width: 100%;
            aspect-ratio: 1/1;
            border-radius: 50%;
            overflow: hidden;
            border: 2px solid var(--hologram-blue);
            box-shadow: 0 0 var(--glow-power) var(--hologram-blue);
            transition: 0.5s;
        }

        .movie-card img { width: 100%; height: 100%; object-fit: cover; }

        .movie-card:hover .hologram-circle {
            transform: scale(1.05);
            border-color: var(--blood-red);
            box-shadow: 0 0 30px var(--blood-red);
        }

        .title {
            font-size: 11px;
            color: #ccc;
            text-align: center;
            display: block;
            margin-top: 12px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .setting-item { margin-bottom: 25px; }
        .setting-item label { font-size: 10px; color: var(--hologram-blue); display: block; margin-bottom: 10px; font-weight: bold;}
        .btn-toggle { background: transparent; border: 1px solid var(--hologram-blue); color: #fff; width: 100%; padding: 8px; cursor: pointer; border-radius: 5px; font-size: 10px; }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="settingsMenu">
        <div class="close-btn" onclick="toggleSettings()">✖ CLOSE</div>
        <h2 style="color: var(--hologram-blue); font-size: 16px; border-bottom: 1px solid #333; padding-bottom: 10px;">COMMAND CENTER</h2>
        <div class="setting-item"><label>GLASS EFFECT (BLUR)</label><button onclick="toggleGlass()" id="glassBtn" class="btn-toggle">OFF</button></div>
        <div class="setting-item"><label>NEON GLOW RADIUS</label><input type="range" min="0" max="50" value="15" oninput="changeGlow(this.value)" style="width: 100%;"></div>
        <div class="setting-item"><label>SYSTEM COLOR</label><input type="color" value="#00f3ff" onchange="changeTheme(this.value)" style="width: 100%; cursor: pointer;"></div>
        <p style="font-size: 9px; color: #444; margin-top: 40px;">ADMIN: MIZANUR RAHMAN</p>
    </div>

    <header>
        <div class="title-wrapper">
            <div class="settings-toggle" onclick="toggleSettings()"><span></span><span></span><span></span></div>
            <div class="brand">MovixUniverse</div>
        </div>
        <input type="text" id="searchInput" placeholder="Scan Database..." onkeyup="search()">
        <div class="db-counter" id="dbCount">DATABASE ACTIVE: 15</div>
    </header>

    <div class="container">
        <a href="https://t.me/Movixuniverse" class="movie-card" data-title="Movixuniverse">
            <div class="hologram-circle"><img src="Movixuniverse.jpg"></div>
            <span class="title">Movixuniverse</span>
        </a>
        <a href="https://t.me/Movixuniverse_group" class="movie-card" data-title="Movie Request Group">
            <div class="hologram-circle"><img src="request.jpg"></div>
            <span class="title">Request Group</span>
        </a>
        <a href="https://t.me/+maNK2CJbGMI4Zjll" class="movie-card" data-title="Bachalor point season 5">
            <div class="hologram-circle"><img src="Bachalor.jpg"></div>
            <span class="title">Bachalor s5</span>
        </a>
        <a href="https://t.me/+Y9u3RcSyv5BlMzc1" class="movie-card" data-title="Bangla Dubbing Movies">
            <div class="hologram-circle"><img src="bangladub.jpg"></div>
            <span class="title">Bangla Dubbing</span>
        </a>
        <a href="https://t.me/+ENRv57NO9LM2OWVl" class="movie-card" data-title="Horror Movie lovers">
            <div class="hologram-circle"><img src="horrormovies.jpg"></div>
            <span class="title">Horror Lovers</span>
        </a>
        <a href="https://t.me/Premium_Apk41" class="movie-card" data-title="Premium apk">
            <div class="hologram-circle"><img src="premiumapk.jpg"></div>
            <span class="title">Premium APK</span>
        </a>
        <a href="https://t.me/Anime_community_M" class="movie-card" data-title="Anime">
            <div class="hologram-circle"><img src="anime.jpg"></div>
            <span class="title">Anime Community</span>
        </a>
        <a href="https://t.me/movie_Lovers_bot_update" class="movie-card" data-title="Movies Update">
            <div class="hologram-circle"><img src="movieUpdate.jpg"></div>
            <span class="title">Bot Updates</span>
        </a>
        <a href="https://t.me/+4hW7JX4Wr3k2ZjA1" class="movie-card" data-title="MAN VS. WILD Bangla">
            <div class="hologram-circle"><img src="manvswild.jpg"></div>
            <span class="title">Man Vs Wild</span>
        </a>
        <a href="https://t.me/+dPNdToHqmApjYWRl" class="movie-card" data-title="Premium Movies">
            <div class="hologram-circle"><img src="premiummovies.jpg"></div>
            <span class="title">Premium Movies</span>
        </a>
        <a href="https://t.me/+fw0MG7ZLaj4wMDBl" class="movie-card" data-title="Bongo movies">
            <div class="hologram-circle"><img src="bongo.jpg"></div>
            <span class="title">Bongo Movies</span>
        </a>
        <a href="https://t.me/+7sMhs4eo6vRmMTI1" class="movie-card" data-title="Hoichoi movies">
            <div class="hologram-circle"><img src="hoichoi.jpg"></div>
            <span class="title">Hoichoi Movies</span>
        </a>
        <a href="https://t.me/+2VEx_J9FFzxjZjBl" class="movie-card" data-title="Chorki movies">
            <div class="hologram-circle"><img src="chorki.jpg"></div>
            <span class="title">Chorki Movies</span>
        </a>
        <a href="https://t.me/+lsVFGBazsmViZmE1" class="movie-card" data-title="Netflix movies">
            <div class="hologram-circle"><img src="netflix.jpg"></div>
            <span class="title">Netflix Movies</span>
        </a>
        <a href="https://t.me/+lsFHX6aY_JlmMDRl" class="movie-card" data-title="iScreen movies">
            <div class="hologram-circle"><img src="iscreen.jpg"></div>
            <span class="title">iScreen Movies</span>
        </a>
    </div>

    <script>
        function toggleSettings() { document.getElementById('settingsMenu').classList.toggle('active'); }
        function changeGlow(val) { document.documentElement.style.setProperty('--glow-power', val + 'px'); }
        function changeTheme(color) { document.documentElement.style.setProperty('--hologram-blue', color); }
        function toggleGlass() {
            let btn = document.getElementById('glassBtn');
            if(btn.innerText === "OFF") {
                document.documentElement.style.setProperty('--blur-val', 'blur(10px)');
                btn.innerText = "ON";
            } else {
                document.documentElement.style.setProperty('--blur-val', 'blur(0px)');
                btn.innerText = "OFF";
            }
        }
        function search() {
            let val = document.getElementById('searchInput').value.toLowerCase();
            let cards = document.querySelectorAll('.movie-card');
            let count = 0;
            cards.forEach(c => {
                let t = c.getAttribute('data-title').toLowerCase();
                if(t.includes(val)) { c.classList.remove('hidden'); count++; }
                else { c.classList.add('hidden'); }
            });
            document.getElementById('dbCount').innerText = "DATABASE ACTIVE: " + count;
        }
    </script>
</body>
</html>
